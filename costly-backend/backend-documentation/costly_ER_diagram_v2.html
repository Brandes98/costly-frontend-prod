<!DOCTYPE html>

<meta charset="UTF-8">

<title>Costly — Diagrama ER v2</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; overflow: hidden; }

  #toolbar {
    position: fixed; top: 0; left: 0; right: 0; height: 52px;
    background: #1a1d2e; border-bottom: 1px solid #2d3748;
    display: flex; align-items: center; gap: 12px; padding: 0 20px; z-index: 1000;
  }
  #toolbar h1 { font-size: 15px; font-weight: 700; color: #63b3ed; letter-spacing: 1px; margin-right: 8px; }
  #toolbar span { font-size: 12px; color: #718096; }
  .tb-btn {
    padding: 5px 12px; border-radius: 6px; border: 1px solid #2d3748;
    background: #2d3748; color: #e2e8f0; font-size: 12px; cursor: pointer;
    transition: all .15s;
  }
  .tb-btn:hover { background: #4a5568; border-color: #63b3ed; }
  .tb-sep { width: 1px; height: 24px; background: #2d3748; margin: 0 4px; }
  #zoom-label { font-size: 12px; color: #a0aec0; min-width: 40px; text-align: center; }

  /* Legend */
  #legend {
    position: fixed; bottom: 16px; left: 16px; background: #1a1d2e;
    border: 1px solid #2d3748; border-radius: 10px; padding: 12px 16px; z-index: 1000;
    font-size: 11px;
  }
  #legend h3 { font-size: 11px; color: #a0aec0; margin-bottom: 8px; letter-spacing: .5px; }
  .leg-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .leg-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

  /* Canvas */
  #canvas-wrap { position: fixed; top: 52px; left: 0; right: 0; bottom: 0; overflow: hidden; }
  #canvas { position: absolute; transform-origin: 0 0; cursor: grab; }
  #canvas.grabbing { cursor: grabbing; }

  /* Tabla */
  .table-card {
    position: absolute; min-width: 200px;
    background: #1a1d2e; border: 2px solid #2d3748;
    border-radius: 10px; overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,.5);
    transition: box-shadow .2s, border-color .2s;
    user-select: none;
  }
  .table-card:hover { border-color: #63b3ed; box-shadow: 0 6px 30px rgba(99,179,237,.2); }
  .table-card.selected { border-color: #f6ad55; box-shadow: 0 0 0 3px rgba(246,173,85,.2); }

  .card-header {
    padding: 8px 12px; display: flex; align-items: center; gap: 8px; cursor: move;
  }
  .card-icon { font-size: 14px; }
  .card-title { font-size: 12px; font-weight: 700; letter-spacing: .5px; flex: 1; }
  .card-count { font-size: 10px; color: #718096; background: #2d3748; padding: 1px 6px; border-radius: 8px; }

  .card-body { padding: 6px 0; border-top: 1px solid #2d3748; }
  .field-row {
    display: flex; align-items: center; padding: 3px 12px; gap: 6px;
    font-size: 11px; line-height: 1.4;
  }
  .field-row:hover { background: #2d3748; }
  .field-pk  { color: #f6ad55; font-weight: 700; }
  .field-fk  { color: #68d391; }
  .field-norm{ color: #cbd5e0; }
  .field-new { color: #b794f4; }
  .badge {
    font-size: 9px; padding: 1px 5px; border-radius: 4px; font-weight: 700; flex-shrink: 0;
  }
  .badge-pk  { background: #744210; color: #f6ad55; }
  .badge-fk  { background: #1c4532; color: #68d391; }
  .badge-uk  { background: #2a4365; color: #90cdf4; }
  .badge-new { background: #44337a; color: #d6bcfa; }
  .field-type { color: #718096; font-size: 10px; margin-left: auto; flex-shrink: 0; }

  /* SVG relaciones */
  #relations-svg {
    position: absolute; top: 0; left: 0; pointer-events: none;
    overflow: visible;
  }
  .rel-line { stroke-width: 1.5; fill: none; opacity: .5; }
  .rel-line:hover { opacity: 1; }

  /* Info panel */
  #info-panel {
    position: fixed; top: 64px; right: 16px;
    background: #1a1d2e; border: 1px solid #2d3748; border-radius: 10px;
    padding: 14px 16px; width: 240px; z-index: 999;
    font-size: 11px; display: none;
  }
  #info-panel h3 { font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #63b3ed; }
  #info-panel .info-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
  #info-panel .info-key { color: #718096; }
  #info-panel .info-val { color: #e2e8f0; font-weight: 600; }
  #close-panel { float: right; cursor: pointer; color: #718096; font-size: 14px; }
  #close-panel:hover { color: #e2e8f0; }
</style>

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
let scale = 0.75
let panX = 20, panY = 20
let showRels = true
const positions = { ...POSITIONS }

const canvas  = document.getElementById('canvas')
const svg     = document.getElementById('relations-svg')

function renderAll() {
  canvas.innerHTML = ''
  canvas.appendChild(svg)
  svg.innerHTML = ''
  canvas.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`

  TABLES.forEach(tbl => {
    const el = createCard(tbl)
    canvas.appendChild(el)
  })

  if (showRels) drawRelations()
}

function createCard(tbl) {
  const pos = positions[tbl.id] || { x: 100, y: 100 }
  const card = document.createElement('div')
  card.className = 'table-card'
  card.id = 'card-' + tbl.id
  card.style.left  = pos.x + 'px'
  card.style.top   = pos.y + 'px'
  card.style.borderColor = tbl.headerColor

  const fieldCount = tbl.fields.length

  card.innerHTML = `
    <div class="card-header" style="background:${tbl.color}">
      <span class="card-icon">${tbl.icon}</span>
      <span class="card-title" style="color:${tbl.headerColor === '#6b46c1' ? '#d6bcfa' : '#90cdf4'}">${tbl.title}</span>
      <span class="card-count">${fieldCount} campos</span>
    </div>
    <div class="card-body">
      ${tbl.fields.map(f => {
        const cls = f.badge === 'PK' ? 'field-pk' : f.badge === 'FK' ? 'field-fk' : f.badge === 'NEW' ? 'field-new' : 'field-norm'
        const badgeHtml = f.badge
          ? `<span class="badge badge-${f.badge.toLowerCase()}">${f.badge}</span>`
          : ''
        return `<div class="field-row">
          ${badgeHtml}
          <span class="${cls}">${f.name}</span>
          <span class="field-type">${f.type}</span>
        </div>`
      }).join('')}
    </div>
  `

  // Drag
  let dragging = false, startX, startY, origX, origY
  const header = card.querySelector('.card-header')
  header.addEventListener('mousedown', e => {
    dragging = true
    startX = e.clientX; startY = e.clientY
    origX = positions[tbl.id].x; origY = positions[tbl.id].y
    canvas.classList.add('grabbing')
    e.preventDefault()
  })
  document.addEventListener('mousemove', e => {
    if (!dragging) return
    const dx = (e.clientX - startX) / scale
    const dy = (e.clientY - startY) / scale
    positions[tbl.id] = { x: origX + dx, y: origY + dy }
    card.style.left = positions[tbl.id].x + 'px'
    card.style.top  = positions[tbl.id].y + 'px'
    if (showRels) drawRelations()
  })
  document.addEventListener('mouseup', () => {
    if (dragging) { dragging = false; canvas.classList.remove('grabbing') }
  })

  // Click info
  card.addEventListener('click', e => {
    if (e.target.closest('.card-header') && !dragging) showInfo(tbl)
  })

  return card
}

function getCardCenter(id) {
  const card = document.getElementById('card-' + id)
  if (!card) return null
  const w = card.offsetWidth
  const h = card.offsetHeight
  const pos = positions[id]
  return { x: pos.x + w / 2, y: pos.y + h / 2, w, h, x0: pos.x, y0: pos.y }
}

function drawRelations() {
  svg.innerHTML = ''
  const colors = { core: '#4299e1', ops: '#9f7aea', fin: '#68d391', new: '#f6ad55' }

  RELATIONS.forEach(([from, to]) => {
    const a = getCardCenter(from)
    const b = getCardCenter(to)
    if (!a || !b) return

    const fromTbl = TABLES.find(t => t.id === from)
    const color = colors[fromTbl?.group] || '#4a5568'

    const dx = b.x - a.x
    const dy = b.y - a.y
    const cx1 = a.x + dx * 0.5
    const cy1 = a.y
    const cx2 = a.x + dx * 0.5
    const cy2 = b.y

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path')
    path.setAttribute('d', `M${a.x},${a.y} C${cx1},${cy1} ${cx2},${cy2} ${b.x},${b.y}`)
    path.setAttribute('class', 'rel-line')
    path.setAttribute('stroke', color)
    svg.appendChild(path)

    // Punto en destino
    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle')
    dot.setAttribute('cx', b.x); dot.setAttribute('cy', b.y); dot.setAttribute('r', 3)
    dot.setAttribute('fill', color)
    svg.appendChild(dot)
  })
}

function showInfo(tbl) {
  const panel = document.getElementById('info-panel')
  const newFields  = tbl.fields.filter(f => f.badge === 'NEW').length
  const fkFields   = tbl.fields.filter(f => f.badge === 'FK').length
  const relCount   = RELATIONS.filter(([f, t]) => f === tbl.id || t === tbl.id).length

  document.getElementById('info-title').textContent = `${tbl.icon} ${tbl.title}`
  document.getElementById('info-content').innerHTML = `
    <div class="info-row"><span class="info-key">Grupo</span><span class="info-val">${tbl.group.toUpperCase()}</span></div>
    <div class="info-row"><span class="info-key">Campos</span><span class="info-val">${tbl.fields.length}</span></div>
    <div class="info-row"><span class="info-key">FKs</span><span class="info-val">${fkFields}</span></div>
    <div class="info-row"><span class="info-key">Campos nuevos</span><span class="info-val" style="color:#d6bcfa">${newFields}</span></div>
    <div class="info-row"><span class="info-key">Relaciones</span><span class="info-val">${relCount}</span></div>
  `
  panel.style.display = 'block'
}

// ── Zoom & Pan
function zoomIn()  { scale = Math.min(scale * 1.2, 3); applyTransform() }
function zoomOut() { scale = Math.max(scale / 1.2, .15); applyTransform() }
function resetView() { scale = .75; panX = 20; panY = 20; applyTransform() }
function applyTransform() {
  canvas.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`
  document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%'
}
function toggleRelations() { showRels = !showRels; showRels ? drawRelations() : (svg.innerHTML = '') }

// Mouse wheel zoom
document.getElementById('canvas-wrap').addEventListener('wheel', e => {
  e.preventDefault()
  const factor = e.deltaY < 0 ? 1.1 : 0.9
  scale = Math.min(Math.max(scale * factor, .15), 3)
  applyTransform()
}, { passive: false })

// Pan
let panning = false, panStartX, panStartY
document.getElementById('canvas-wrap').addEventListener('mousedown', e => {
  if (e.target === canvas || e.target === document.getElementById('canvas-wrap')) {
    panning = true; panStartX = e.clientX - panX; panStartY = e.clientY - panY
    canvas.classList.add('grabbing')
  }
})
document.addEventListener('mousemove', e => {
  if (!panning) return
  panX = e.clientX - panStartX; panY = e.clientY - panStartY
  applyTransform()
})
document.addEventListener('mouseup', () => { panning = false; canvas.classList.remove('grabbing') })

// Auto-layout (grilla)
function autoLayout() {
  const cols = 5
  const colW = 260, rowH = 480
  TABLES.forEach((tbl, i) => {
    const col = i % cols
    const row = Math.floor(i / cols)
    positions[tbl.id] = { x: 20 + col * colW, y: 20 + row * rowH }
  })
  renderAll()
}

// Init
renderAll()
document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%'
</script>
